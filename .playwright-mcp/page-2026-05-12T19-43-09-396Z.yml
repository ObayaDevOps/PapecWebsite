          - heading "With a blend of national and international education experience, we offer a balanced understanding of education systems and school development." [level=2] [ref=e19]
        - generic [ref=e20]:
          - paragraph [ref=e21]: Audrey Dralega
          - paragraph [ref=e27]: Prior to relocating to Uganda, Audrey served as Course Tutor in the School of Education Centre for Studies in Science & Mathematics Education (CSSME), University of Leeds, UK. There she taught the Primary Mathematics component of the Post Graduate Certificate in Education (PGCE) and her course component was deemed ‘most practical and informative’ in the student end of year evaluations. She has delivered numerous BTEC & Higher National Certificate (HNC) training courses including Early Childhood Learning, Special Needs Education, Curriculum Mathematics and Curriculum Science and designed and delivered training both in her schools in the UK and in the international sector.
        - generic [ref=e28]:
          - paragraph [ref=e29]: Fiona Naggaga Musoke
          - paragraph [ref=e35]: Fiona Naggaga Musoke has over a decade of international school teaching experience as well as a keen understanding of the Ugandan National Curriculum. Following her Bachelor's Degree in Law from Makerere University, where she graduated among the top students in her class, Fiona’s interest in Human Rights led to her employment at the Uganda Human Rights Commission. After relocating from Uganda, Fiona obtained a Postgraduate Certificate in Law from the University of London which included a course on the International Rights of the Child. She then made the decision to pursue her true passion which is education. Fiona has a Postgraduate Certificate in Education (International) from the University of Nottingham. She successfully completed a COBIS Programme for Middle Leaders and several TES Safeguarding and Duty of Care courses.
